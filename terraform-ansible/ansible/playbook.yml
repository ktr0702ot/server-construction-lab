---
- hosts: web
  become: yes

  tasks:
    - name: Nginxをインストール
      ansible.builtin.yum:
        name: nginx
        state: present

    - name: Nginxを起動・自動起動設定
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes

    - name: カスタムHTMLを配置
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><title>Terraform + Ansible</title></head>
          <body>
            <h1>Hello from Terraform * Ansible!</h1>
            <p>TerraformでEC2を構築し、AnsibleでNginxを自動設定しました。</p>
          </body>
          </html>
        dest: /usr/share/nginx/html/index.html
